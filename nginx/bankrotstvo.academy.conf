server {
    listen 80;
    server_name bankrotstvo.academy www.bankrotstvo.academy;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name bankrotstvo.academy www.bankrotstvo.academy;

    # SSL (пути подставить актуальные после certbot)
    ssl_certificate     /etc/letsencrypt/live/bankrotstvo.academy/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bankrotstvo.academy/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Разрешить загрузку файлов до 100 МБ
    client_max_body_size 100m;

    root /var/www/bankrotstvo.academy/dist;
    index index.html;

    # SPA fallback — всё, что не файл и не /api, отдаём index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Проксируем API-запросы на Express
    location /api/ {
        proxy_pass         http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Тайм-ауты для больших загрузок
        proxy_read_timeout    300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout    300s;

        # Буфер для проксирования больших файлов
        proxy_request_buffering off;
    }

    # Статические загруженные файлы
    location /uploads/ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
